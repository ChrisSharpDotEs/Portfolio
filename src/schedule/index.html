<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador</title>
    <meta content="" name="description">
    <meta content="" name="keywords">
    <link rel="manifest" href="./manifest.json">
    <!-- Favicons -->
    <link rel="shortcut icon" href="./icon.svg" type="image/x-icon">
    <!-- Estilos CSS -->
    <link href="../../public/css/app.css" rel="stylesheet">
    <!-- Scripts -->
    <script src="index.js"></script>
</head>

<body id="schedule" class="bg-light-custom funnel-display">
    <header class="p-4">
        <div class="row">
            <div class="col-9">
                <p class="text-primary fs-4 fw-bold">Let's become more <span class="text-warning">Productive</span></p>
            </div>
            <div class="col-3">
                <div class="text-center">
                </div>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="row">
            <div class="col-md-8">
                <article class="container">
                    <div class="bg-primary p-3 rounded row mx-0">
                        <div class="col-9">
                            <p class="text-light">Gestiona tu tiempo de manera efectiva</p>
                            <button id="download" class="btn btn-warning text-light fw-bold" data-bs-toggle="tooltip"
                                data-bs-placement="top" title="Obtener json">
                                <span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                        class="bi bi-cloud-arrow-down-fill" viewBox="0 0 16 16">
                                        <path
                                            d="M8 2a5.53 5.53 0 0 0-3.594 1.342c-.766.66-1.321 1.52-1.464 2.383C1.266 6.095 0 7.555 0 9.318 0 11.366 1.708 13 3.781 13h8.906C14.502 13 16 11.57 16 9.773c0-1.636-1.242-2.969-2.834-3.194C12.923 3.999 10.69 2 8 2m2.354 6.854-2 2a.5.5 0 0 1-.708 0l-2-2a.5.5 0 1 1 .708-.708L7.5 9.293V5.5a.5.5 0 0 1 1 0v3.793l1.146-1.147a.5.5 0 0 1 .708.708" />
                                    </svg>
                                </span>
                                <span class="px-2">Bajar</span>
                            </button>
                            <button type="button" id="uploadjson" class="btn btn-secondary" data-bs-toggle="tooltip"
                                data-bs-placement="top" title="Subir JSON">
                                <input type="file" name="jsonfile" id="jsonfile" class="d-none" accept=".json">
                                <span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                        class="bi bi-cloud-arrow-up-fill" viewBox="0 0 16 16">
                                        <path
                                            d="M8 2a5.53 5.53 0 0 0-3.594 1.342c-.766.66-1.321 1.52-1.464 2.383C1.266 6.095 0 7.555 0 9.318 0 11.366 1.708 13 3.781 13h8.906C14.502 13 16 11.57 16 9.773c0-1.636-1.242-2.969-2.834-3.194C12.923 3.999 10.69 2 8 2m2.354 5.146a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2a.5.5 0 0 1 .708 0z" />
                                    </svg>
                                </span>
                                <span class="px-2">Subir</span>
                            </button>
                        </div>
                        <div class="col-3 d-flex justify-content-center align-items-center">
                            <canvas id="circleCanvas" width="100%"></canvas>
                        </div>
                    </div>
                </article>
                <article class="my-4 container">
                    <article>
                        <div id="filelist" class="d-flex justify-content-end p-2"></div>
                        <div class="border rounded p-4">
                            <div class="d-flex justify-content-around gap-2">
                                <button type="button" name="iniciar" id="iniciar"
                                    class="btn btn-success rounded-pill w-sm-25" disabled>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor"
                                        class="bi bi-play-circle" viewBox="0 0 16 16">
                                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
                                        <path
                                            d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445" />
                                    </svg>
                                    <span class="px-4 d-none d-md-inline">Iniciar</span>
                                </button>
                                <button type="button" name="finalizar" id="finalizar"
                                    class="btn rounded-pill btn-danger w-sm-25" disabled>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor"
                                        class="bi bi-stop-circle" viewBox="0 0 16 16">
                                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
                                        <path
                                            d="M5 6.5A1.5 1.5 0 0 1 6.5 5h3A1.5 1.5 0 0 1 11 6.5v3A1.5 1.5 0 0 1 9.5 11h-3A1.5 1.5 0 0 1 5 9.5z" />
                                    </svg>
                                    <span class="px-4 d-none d-md-inline">Finalizar</span>
                                </button>
                            </div>
                        </div>
                    </article>
                </article>
                <article class="my-4 container">
                    <div class="row">
                        <div class="col-6">
                            <article class="border rounded p-4 text-center">
                                <h4>Tiempo transcurrido</h4>
                                <div id="temporizador" class="fs-2 text-center"></div>
                            </article>
                        </div>
                        <div class="col-6">
                            <article>
                                <div class="rounded bg-warning p-4">
                                    <i><small id="daily-messages" class="text-dark"></small></i>
                                </div>
                            </article>
                        </div>
                    </div>
                </article>
            </div>
            <div class="col-md-4">
                <article class="my-4 container">
                    <article>
                        <h4>Historial</h4>
                        <div class="border rounded p-4">
                            <div class="border-bottom p-3">
                                <button type="button" id="generateTable" class="btn rounded-pill btn-info w-sm-25">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor"
                                        class="bi bi-info-circle" viewBox="0 0 16 16">
                                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
                                        <path
                                            d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0" />
                                    </svg>
                                    <span class="px-4 d-none d-lg-inline">Mostrar</span>
                                </button>
                            </div>
                            <div id="historial" class="table-responsive"></div>
                        </div>
                    </article>
                </article>
            </div>
        </div>
    </main>
    <footer>
        <article class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top px-4">
            <div class="col-md-4 d-flex align-items-center">
                <a class="mb-3 me-2 mb-md-0 text-muted text-decoration-none lh-1" href="/"></a>
                <span class="mb-3 mb-md-0 text-muted">
                    © 2024 Cristian, Inc
                </span>
            </div>
            <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
                <li class="ms-3">
                    <a class="text-muted" href="#">
                        <i class="bi bi-twitter-x">
                        </i>
                    </a>
                </li>
                <li class="ms-3">
                    <a class="text-muted" href="#">
                        <i class="bi bi-instagram">
                        </i>
                    </a>
                </li>
                <li class="ms-3">
                    <a class="text-muted" href="#">
                        <i class="bi bi-linkedin">
                        </i>
                    </a>
                </li>
            </ul>
        </article>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
