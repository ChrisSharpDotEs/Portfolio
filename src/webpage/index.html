<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Portfolio</title>
    <meta content="" name="description">
    <meta content="" name="keywords">
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <link rel="stylesheet" href="../../public/css/app.css">
    <script src="../../assets/js/index.js" type="module"></script>
    <style>
        /* Contenedor del video */
        .video-container {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        /* Configuración del video */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            height: 30rem;
            z-index: -1;
            object-fit: contain;
            /* Asegura que el video se ajuste sin deformarse */
        }

        /* Contenido sobre el video */
        .contenido {
            position: relative;
            z-index: 1;
            top: 10rem;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar fixed-top navbar-expand-sm bg-primary navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="#">MyBrand</a>
                <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavId" aria-controls="collapsibleNavId" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapsibleNavId">
                    <ul class="navbar-nav me-auto mt-2 mt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" aria-current="page">
                                Inicio
                                <span class="visually-hidden">(current)</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#aboutus">Conócenos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#services">Servicios</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#contact">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section id="home" class="video-container">
            <video autoplay loop muted playsinline>
                <source src="./assets/videos/presentation.mp4" type="video/mp4">
                Tu navegador no soporta el elemento video.
            </video>
            <div class="container text-center contenido">
                <h1>Texto sobre el video</h1>
                <p>Agrega aquí cualquier contenido adicional.</p>
            </div>
        </section>
        <section id="aboutus"></section>
        <section id="services" class="bg-primary"></section>
    </main>
</body>

</html>
